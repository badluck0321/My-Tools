# App & Server
spring.application.name=${SPRING_APPLICATION_NAME:backend-mytools}
server.port=${SERVER_PORT:8888}
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# MongoDB
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/mytoolsdb}

# Keycloak / Security
spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/myrealm}

# CORS
mytools.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000,http://localhost:4173}

# Seed assets / Cloudinary
# Seeder stores public Cloudinary URLs directly; credentials are optional unless you extend the seeder to query your Cloudinary account.
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:dkmhbowlx}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}
mytools.seed.cloudinary-base-url=${CLOUDINARY_BASE_URL:https://res.cloudinary.com/dkmhbowlx/image/upload}
mytools.seed.enabled=${SEED_ENABLED:true}

# Actuator (monitoring)
management.endpoints.web.exposure.include=${ACTUATOR_ENDPOINTS:health,info,metrics,loggers}
management.endpoint.health.show-details=${ACTUATOR_HEALTH_DETAILS:always}

# Logging
logging.level.com.example.BackEnd_MyTools=${APP_LOG_LEVEL:INFO}
logging.level.org.springframework.web=${SPRING_WEB_LOG_LEVEL:WARN}
logging.level.org.springframework.security=${SPRING_SECURITY_LOG_LEVEL:WARN}
logging.level.org.mongodb.driver=${MONGO_LOG_LEVEL:WARN}
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %-5level - %msg%n
logging.level.org.springframework.web.servlet.mvc.support.DefaultHandlerExceptionResolver=OFF
logging.level.org.apache.catalina.core.ContainerBase=ERROR
logging.file.name=${LOG_FILE:logs/mytools-app.log}
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.logback.rollingpolicy.max-file-size=${LOG_MAX_FILE_SIZE:10MB}
logging.logback.rollingpolicy.max-history=${LOG_MAX_HISTORY:30}

# Kafka
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.group-id=${KAFKA_CONSUMER_GROUP:mytools-group}
spring.kafka.consumer.auto-offset-reset=${KAFKA_AUTO_OFFSET_RESET:earliest}
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.example.BackEnd_MyTools.Kafka.Events

# Groq/OpenAI-compatible AI endpoint
spring.ai.openai.base-url=${OPENAI_BASE_URL:https://api.groq.com/openai}
spring.ai.openai.api-key=xxx
spring.ai.openai.chat.options.model=${OPENAI_CHAT_MODEL:llama-3.3-70b-versatile}
spring.ai.openai.chat.options.temperature=${OPENAI_TEMPERATURE:0.4}

# My-Tools feature flags
mytools.payment.provider=${PAYMENT_PROVIDER:mock}
mytools.email.enabled=${EMAIL_ENABLED:false}

# SMTP placeholders; set real values in environment for production
spring.mail.host=${SMTP_HOST:localhost}
spring.mail.port=${SMTP_PORT:1025}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${SMTP_STARTTLS:false}
